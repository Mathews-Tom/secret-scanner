spec_version: "0.1.0"
name: secret-scanner
version: "1.0.0"
description: >
  Pre-commit secret detection — scans for hardcoded API keys, passwords, tokens,
  connection strings, private keys, and high-entropy strings across AWS, GitHub,
  Slack, Stripe, Google, Azure patterns
license: MIT

model:
  preferred: claude-haiku-4-5-20251001
  fallback:
    - claude-sonnet-4-5-20250929
  constraints:
    temperature: 0.4
    max_tokens: 16384

skills: []

runtime:
  max_turns: 50
  timeout: 600

tags:
  - security
  - secrets
  - pre-commit
  - credential-detection
  - api-keys
  - devops
